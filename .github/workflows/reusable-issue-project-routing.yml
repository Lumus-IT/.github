---
name: Reusable Routing - Issue Project Status

'on':
  workflow_call:
    inputs:
      project_owner:
        description: "Owner do Project (org/user), ex.: Lumus-IT"
        required: true
        type: string
      project_number:
        description: "Número do ProjectV2, ex.: 6"
        required: true
        type: string
      issue_numbers_csv:
        description: >-
          Fallback opcional para números de issue (csv) quando
          closingIssuesReferences estiver vazio.
        required: false
        default: ""
        type: string
      status_name_triage:
        description: Status para eventos de issue (opened/reopened/edited)
        required: false
        default: Triage
        type: string
      status_name_in_progress:
        description: Status para pull_request.opened
        required: false
        default: In-progress
        type: string
      status_name_ready:
        description: Status para pull_request.reopened
        required: false
        default: Ready
        type: string
      status_name_in_review:
        description: Status para pull_request.ready_for_review
        required: false
        default: In review
        type: string
      status_name_done:
        description: Status para pull_request.closed com merge e issues.closed com completed
        required: false
        default: Done
        type: string
      status_name_canceled:
        description: Status para pull_request.closed sem merge e issues.closed sem completed
        required: false
        default: Canceled
        type: string
      close_issue_on_merge:
        description: >-
          Se true, fecha a issue via API quando pull_request.closed + merged.
        required: false
        default: false
        type: boolean
      require_status_field:
        description: Exigir validação do campo Status e da option alvo
        required: false
        default: true
        type: boolean
    secrets:
      project_automation_token:
        description: Token para chamadas GraphQL/REST na API do GitHub
        required: true
    outputs:
      processed_issue_numbers:
        description: CSV das issues processadas
        value: ${{ jobs.route.outputs.processed_issue_numbers }}
      applied_status_name:
        description: Status aplicado na execução
        value: ${{ jobs.route.outputs.applied_status_name }}
      close_issue_on_merge_applied:
        description: true quando o fechamento automático foi aplicado
        value: ${{ jobs.route.outputs.close_issue_on_merge_applied }}

jobs:
  route:
    name: Rotear issue para Project e status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.project_automation_token }}
      INPUT_PROJECT_OWNER: ${{ inputs.project_owner }}
      INPUT_PROJECT_NUMBER: ${{ inputs.project_number }}
      INPUT_ISSUE_NUMBERS_CSV: ${{ inputs.issue_numbers_csv }}
      INPUT_STATUS_TRIAGE: ${{ inputs.status_name_triage }}
      INPUT_STATUS_IN_PROGRESS: ${{ inputs.status_name_in_progress }}
      INPUT_STATUS_READY: ${{ inputs.status_name_ready }}
      INPUT_STATUS_IN_REVIEW: ${{ inputs.status_name_in_review }}
      INPUT_STATUS_DONE: ${{ inputs.status_name_done }}
      INPUT_STATUS_CANCELED: ${{ inputs.status_name_canceled }}
      INPUT_REQUIRE_STATUS_FIELD: ${{ inputs.require_status_field }}
      INPUT_CLOSE_ISSUE_ON_MERGE: ${{ inputs.close_issue_on_merge }}
    outputs:
      processed_issue_numbers: ${{ steps.summary.outputs.processed_issue_numbers }}
      applied_status_name: ${{ steps.summary.outputs.applied_status_name }}
      close_issue_on_merge_applied: ${{ steps.summary.outputs.close_issue_on_merge_applied }}
    steps:
      - name: Validar pré-requisitos
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "Secret project_automation_token não foi informado."
            exit 1
          fi

          if ! [[ "${INPUT_PROJECT_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "project_number inválido: ${INPUT_PROJECT_NUMBER}"
            exit 1
          fi

          gh --version >/dev/null
          jq --version >/dev/null

      - name: Resolver evento, status alvo e issues
        id: context
        run: |
          set -euo pipefail

          csv_to_issue_refs_json() {
            local csv_input="${1:-}"
            local owner="${2:-}"
            local name="${3:-}"
            echo "${csv_input}" |
              tr ',;' '\n' |
              tr -d '\r' |
              sed 's/^[[:space:]]*//;s/[[:space:]]*$//' |
              awk '/^[0-9]+$/' |
              jq -Rsc --arg owner "${owner}" --arg name "${name}" '
                split("\n")
                | map(select(length > 0) | tonumber)
                | unique
                | map({owner: $owner, name: $name, number: .})
              '
          }

          event_name="${GITHUB_EVENT_NAME}"
          action="$(jq -r '.action // empty' "${GITHUB_EVENT_PATH}")"
          repo_owner_current="${GITHUB_REPOSITORY%/*}"
          repo_name_current="${GITHUB_REPOSITORY#*/}"

          should_process="true"
          should_close_issue="false"
          target_status_name=""
          issue_refs_json='[]'
          skip_reason=""

          if [ "${event_name}" = "issues" ]; then
            issue_is_pr="$({
              jq -r 'if .issue.pull_request then "true" else "false" end' \
                "${GITHUB_EVENT_PATH}"
            })"

            if [ "${issue_is_pr}" = "true" ]; then
              should_process="false"
              skip_reason="Evento issues recebido para pull request; escopo é somente issues."
            fi

            if [ "${should_process}" = "true" ]; then
              issue_state_reason="$(jq -r '.issue.state_reason // empty' "${GITHUB_EVENT_PATH}")"

              case "${action}" in
                opened|reopened|edited)
                  target_status_name="${INPUT_STATUS_TRIAGE}"
                  issue_number="$(jq -r '.issue.number // empty' "${GITHUB_EVENT_PATH}")"
                  if ! [[ "${issue_number}" =~ ^[0-9]+$ ]]; then
                    echo "Número de issue inválido no payload: ${issue_number}"
                    exit 1
                  fi
                  issue_refs_json="$(
                    jq -nc \
                      --arg owner "${repo_owner_current}" \
                      --arg name "${repo_name_current}" \
                      --argjson number "${issue_number}" \
                      '[{owner: $owner, name: $name, number: $number}]'
                  )"
                  ;;
                closed)
                  case "${issue_state_reason}" in
                    completed)
                      target_status_name="${INPUT_STATUS_DONE}"
                      ;;
                    not_planned|duplicate|"")
                      target_status_name="${INPUT_STATUS_CANCELED}"
                      ;;
                    *)
                      target_status_name="${INPUT_STATUS_CANCELED}"
                      ;;
                  esac
                  issue_number="$(jq -r '.issue.number // empty' "${GITHUB_EVENT_PATH}")"
                  if ! [[ "${issue_number}" =~ ^[0-9]+$ ]]; then
                    echo "Número de issue inválido no payload: ${issue_number}"
                    exit 1
                  fi
                  issue_refs_json="$(
                    jq -nc \
                      --arg owner "${repo_owner_current}" \
                      --arg name "${repo_name_current}" \
                      --argjson number "${issue_number}" \
                      '[{owner: $owner, name: $name, number: $number}]'
                  )"
                  ;;
                *)
                  should_process="false"
                  skip_reason="Ação issues.${action} sem roteamento configurado."
                  ;;
              esac
            fi
          elif [ "${event_name}" = "pull_request" ]; then
            case "${action}" in
              opened)
                target_status_name="${INPUT_STATUS_IN_PROGRESS}"
                ;;
              reopened)
                target_status_name="${INPUT_STATUS_READY}"
                ;;
              ready_for_review|review_requested)
                target_status_name="${INPUT_STATUS_IN_REVIEW}"
                ;;
              closed)
                merged="$(jq -r '.pull_request.merged // false' "${GITHUB_EVENT_PATH}")"
                if [ "${merged}" = "true" ]; then
                  target_status_name="${INPUT_STATUS_DONE}"
                  if [ "${INPUT_CLOSE_ISSUE_ON_MERGE}" = "true" ]; then
                    should_close_issue="true"
                  fi
                else
                  target_status_name="${INPUT_STATUS_CANCELED}"
                fi
                ;;
              *)
                should_process="false"
                skip_reason="Ação pull_request.${action} sem roteamento configurado."
                ;;
            esac

            if [ "${should_process}" = "true" ]; then
              pr_number="$(jq -r '.pull_request.number // empty' "${GITHUB_EVENT_PATH}")"
              if ! [[ "${pr_number}" =~ ^[0-9]+$ ]]; then
                echo "Número de PR inválido no payload: ${pr_number}"
                exit 1
              fi

              pr_query='query($owner:String!, $name:String!, $number:Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 50) {
                      nodes {
                        number
                        repository {
                          name
                          owner {
                            login
                          }
                        }
                      }
                    }
                  }
                }
              }'

              pr_json="$(gh api graphql \
                -f query="${pr_query}" \
                -F owner="${repo_owner_current}" \
                -F name="${repo_name_current}" \
                -F number="${pr_number}")"

              issue_refs_json="$({
                echo "${pr_json}" |
                  jq -c '
                    [
                      .data.repository.pullRequest.closingIssuesReferences.nodes[]?
                      | select(
                          .number != null and
                          .repository.name != null and
                          .repository.owner.login != null
                        )
                      | {
                          owner: .repository.owner.login,
                          name: .repository.name,
                          number: .number
                        }
                    ]
                    | unique_by([.owner, .name, .number])
                  '
              })"

              if [ "$(echo "${issue_refs_json}" | jq 'length')" -eq 0 ] && \
                [ -n "${INPUT_ISSUE_NUMBERS_CSV}" ]; then
                issue_refs_json="$(
                  csv_to_issue_refs_json \
                    "${INPUT_ISSUE_NUMBERS_CSV}" \
                    "${repo_owner_current}" \
                    "${repo_name_current}"
                )"
              fi

              if [ "$(echo "${issue_refs_json}" | jq 'length')" -eq 0 ]; then
                should_process="false"
                skip_reason="Nenhuma issue vinculada na PR (closingIssuesReferences) e sem fallback issue_numbers_csv."
              fi
            fi
          else
            should_process="false"
            skip_reason="Evento ${event_name} fora do escopo do reusable."
          fi

          echo "should_process=${should_process}" >> "${GITHUB_OUTPUT}"
          echo "should_close_issue=${should_close_issue}" >> "${GITHUB_OUTPUT}"
          {
            echo "issue_refs_json<<__ISSUE_REFS_JSON_EOF__"
            echo "${issue_refs_json}"
            echo "__ISSUE_REFS_JSON_EOF__"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "target_status_name<<__TARGET_STATUS_EOF__"
            echo "${target_status_name}"
            echo "__TARGET_STATUS_EOF__"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "skip_reason<<__SKIP_REASON_EOF__"
            echo "${skip_reason}"
            echo "__SKIP_REASON_EOF__"
          } >> "${GITHUB_OUTPUT}"

          if [ "${should_process}" = "true" ]; then
            echo "Roteamento ativo para ${event_name}.${action}: status=${target_status_name}."
            if [ "${event_name}" = "issues" ] && [ "${action}" = "closed" ]; then
              echo "state_reason da issue fechada: ${issue_state_reason:-<empty>}"
            fi
            echo "Issues alvo: ${issue_refs_json}"
          else
            echo "Roteamento ignorado: ${skip_reason}"
          fi

      - name: Resolver metadados do Project
        id: project
        if: ${{ steps.context.outputs.should_process == 'true' }}
        env:
          TARGET_STATUS_NAME: ${{ steps.context.outputs.target_status_name }}
        run: |
          set -euo pipefail

          query='query($owner:String!, $number:Int!) {
            repositoryOwner(login: $owner) {
              __typename
              login
              ... on Organization {
                projectV2(number: $number) {
                  id
                  title
                  fields(first: 100) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
              ... on User {
                projectV2(number: $number) {
                  id
                  title
                  fields(first: 100) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          }'

          project_json="$(gh api graphql \
            -f query="${query}" \
            -F owner="${INPUT_PROJECT_OWNER}" \
            -F number="${INPUT_PROJECT_NUMBER}")"

          project_id="$({
            echo "${project_json}" |
              jq -r '.data.repositoryOwner.projectV2.id // empty'
          })"

          project_title="$({
            echo "${project_json}" |
              jq -r '.data.repositoryOwner.projectV2.title // empty'
          })"

          status_field_id="$({
            echo "${project_json}" |
              jq -r --arg target "Status" '
                .data.repositoryOwner.projectV2
              | .fields.nodes[]?
              | select(.name == $target)
              | .id' |
              head -n1
          })"

          status_option_id="$({
            echo "${project_json}" |
              jq -r --arg option "${TARGET_STATUS_NAME}" '
                .data.repositoryOwner.projectV2
              | .fields.nodes[]?
              | select(.name == "Status")
              | .options[]?
              | select(.name == $option)
              | .id' |
              head -n1
          })"

          if [ -z "${project_id}" ]; then
            echo "Falha ao resolver ProjectV2 ${INPUT_PROJECT_OWNER}#${INPUT_PROJECT_NUMBER}."
            exit 1
          fi

          if [ "${INPUT_REQUIRE_STATUS_FIELD}" = "true" ]; then
            if [ -z "${status_field_id}" ]; then
              echo "Campo Status não encontrado no Project."
              exit 1
            fi
            if [ -z "${status_option_id}" ]; then
              echo "Opção ${TARGET_STATUS_NAME} não encontrada no campo Status."
              exit 1
            fi
          fi

          echo "project_id=${project_id}" >> "${GITHUB_OUTPUT}"
          echo "project_title=${project_title}" >> "${GITHUB_OUTPUT}"
          echo "status_field_id=${status_field_id}" >> "${GITHUB_OUTPUT}"
          echo "status_option_id=${status_option_id}" >> "${GITHUB_OUTPUT}"

      - name: Garantir item no Project e atualizar Status
        id: apply
        if: ${{ steps.context.outputs.should_process == 'true' }}
        env:
          ISSUE_REFS_JSON: ${{ steps.context.outputs.issue_refs_json }}
          TARGET_STATUS_NAME: ${{ steps.context.outputs.target_status_name }}
          PROJECT_ID: ${{ steps.project.outputs.project_id }}
          STATUS_FIELD_ID: ${{ steps.project.outputs.status_field_id }}
          STATUS_OPTION_ID: ${{ steps.project.outputs.status_option_id }}
        run: |
          set -euo pipefail

          processed_csv=""
          processed_issue_refs_json='[]'
          status_update_enabled="true"
          action="$(jq -r '.action // empty' "${GITHUB_EVENT_PATH}")"

          if [ -z "${STATUS_FIELD_ID}" ] || [ -z "${STATUS_OPTION_ID}" ]; then
            status_update_enabled="false"
            echo "Status não será atualizado nesta execução (require_status_field=false sem metadados completos)."
          fi

          for issue_ref in $(echo "${ISSUE_REFS_JSON}" | jq -c '.[]'); do
            issue_repo_owner="$(echo "${issue_ref}" | jq -r '.owner // empty')"
            issue_repo_name="$(echo "${issue_ref}" | jq -r '.name // empty')"
            issue_number="$(echo "${issue_ref}" | jq -r '.number // empty')"

            if [ -z "${issue_repo_owner}" ] || [ -z "${issue_repo_name}" ] || \
              ! [[ "${issue_number}" =~ ^[0-9]+$ ]]; then
              echo "Referência de issue inválida no contexto: ${issue_ref}"
              exit 1
            fi

            issue_json="$(
              gh api "repos/${issue_repo_owner}/${issue_repo_name}/issues/${issue_number}"
            )"

            issue_node_id="$(echo "${issue_json}" | jq -r '.node_id // empty')"
            issue_title="$(echo "${issue_json}" | jq -r '.title // empty')"
            issue_is_pr="$({
              echo "${issue_json}" |
                jq -r 'if .pull_request then "true" else "false" end'
            })"

            if [ -z "${issue_node_id}" ]; then
              echo "Falha ao resolver node_id da issue ${issue_repo_owner}/${issue_repo_name}#${issue_number}."
              exit 1
            fi

            if [ "${issue_is_pr}" = "true" ]; then
              echo "Pulando ${issue_repo_owner}/${issue_repo_name}#${issue_number}: é pull request, não issue."
              continue
            fi

            query='query($issueId:ID!) {
              node(id: $issueId) {
                ... on Issue {
                  projectItems(first: 100) {
                    nodes {
                      id
                      project {
                        id
                      }
                      fieldValues(first: 50) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }'

            issue_projects_json="$(gh api graphql \
              -f query="${query}" \
              -F issueId="${issue_node_id}")"

            project_item_id="$({
              echo "${issue_projects_json}" |
                jq -r --arg project_id "${PROJECT_ID}" '
                  .data.node.projectItems.nodes[]?
                  | select(.project.id == $project_id)
                  | .id' |
                head -n1
            })"

            current_status_name="$({
              echo "${issue_projects_json}" |
                jq -r --arg project_id "${PROJECT_ID}" '
                  .data.node.projectItems.nodes[]?
                  | select(.project.id == $project_id)
                  | .fieldValues.nodes[]?
                  | select(.field.name == "Status")
                  | .name
                ' |
                head -n1
            })"

            if [ -z "${project_item_id}" ]; then
              mutation='mutation($projectId:ID!, $contentId:ID!) {
                addProjectV2ItemById(
                  input: {
                    projectId: $projectId,
                    contentId: $contentId
                  }
                ) {
                  item {
                    id
                  }
                }
              }'

              add_item_json="$(gh api graphql \
                -f query="${mutation}" \
                -F projectId="${PROJECT_ID}" \
                -F contentId="${issue_node_id}")"

              project_item_id="$(echo "${add_item_json}" | jq -r '.data.addProjectV2ItemById.item.id // empty')"

              if [ -z "${project_item_id}" ]; then
                echo "Falha ao adicionar ${issue_repo_owner}/${issue_repo_name}#${issue_number} no Project."
                exit 1
              fi

              echo "Issue ${issue_repo_owner}/${issue_repo_name}#${issue_number} adicionada ao Project como item ${project_item_id}."
            else
              echo "Issue ${issue_repo_owner}/${issue_repo_name}#${issue_number} já estava no Project (item ${project_item_id})."
            fi

            if [ "${status_update_enabled}" = "true" ]; then
              should_skip_triage_downgrade="false"

              if [ "${GITHUB_EVENT_NAME}" = "issues" ] && [ "${action}" = "edited" ]; then
                case "${current_status_name}" in
                  "${INPUT_STATUS_READY}"|"${INPUT_STATUS_IN_PROGRESS}"|"${INPUT_STATUS_IN_REVIEW}"|"${INPUT_STATUS_DONE}")
                    should_skip_triage_downgrade="true"
                    ;;
                esac
              fi

              if [ "${should_skip_triage_downgrade}" = "true" ]; then
                echo "Issue ${issue_repo_owner}/${issue_repo_name}#${issue_number} (${issue_title}) mantida em ${current_status_name}; issues.edited não rebaixa automaticamente para ${TARGET_STATUS_NAME}."
              else
                mutation='mutation(
                  $projectId:ID!,
                  $itemId:ID!,
                  $fieldId:ID!,
                  $optionId:String!
                ) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId,
                      itemId: $itemId,
                      fieldId: $fieldId,
                      value: {
                        singleSelectOptionId: $optionId
                      }
                    }
                  ) {
                    projectV2Item {
                      id
                    }
                  }
                }'

                gh api graphql \
                  -f query="${mutation}" \
                  -F projectId="${PROJECT_ID}" \
                  -F itemId="${project_item_id}" \
                  -F fieldId="${STATUS_FIELD_ID}" \
                  -F optionId="${STATUS_OPTION_ID}" \
                  >/dev/null

                echo "Issue ${issue_repo_owner}/${issue_repo_name}#${issue_number} (${issue_title}) atualizada para status ${TARGET_STATUS_NAME}."
              fi
            else
              echo "Issue ${issue_repo_owner}/${issue_repo_name}#${issue_number} (${issue_title}) adicionada/reaproveitada sem atualização de status."
            fi

            if [ -z "${processed_csv}" ]; then
              processed_csv="${issue_number}"
            else
              processed_csv="${processed_csv},${issue_number}"
            fi

            processed_issue_refs_json="$(
              echo "${processed_issue_refs_json}" |
                jq -c \
                  --arg owner "${issue_repo_owner}" \
                  --arg name "${issue_repo_name}" \
                  --argjson number "${issue_number}" '
                    . + [{owner: $owner, name: $name, number: $number}]
                    | unique_by([.owner, .name, .number])
                  '
            )"
          done

          echo "processed_issue_numbers=${processed_csv}" >> "${GITHUB_OUTPUT}"
          {
            echo "processed_issue_refs_json<<__PROCESSED_ISSUE_REFS_JSON_EOF__"
            echo "${processed_issue_refs_json}"
            echo "__PROCESSED_ISSUE_REFS_JSON_EOF__"
          } >> "${GITHUB_OUTPUT}"

      - name: Fechar issues (opcional)
        id: close
        if: |
          steps.context.outputs.should_process == 'true' &&
          steps.context.outputs.should_close_issue == 'true'
        env:
          PROCESSED_ISSUE_REFS_JSON: ${{ steps.apply.outputs.processed_issue_refs_json }}
        run: |
          set -euo pipefail

          if [ -z "${PROCESSED_ISSUE_REFS_JSON}" ] || \
            [ "$(echo "${PROCESSED_ISSUE_REFS_JSON}" | jq 'length')" -eq 0 ]; then
            echo "Nenhuma issue processada para fechamento automático."
            exit 0
          fi

          for issue_ref in $(echo "${PROCESSED_ISSUE_REFS_JSON}" | jq -c '.[]'); do
            issue_repo_owner="$(echo "${issue_ref}" | jq -r '.owner // empty')"
            issue_repo_name="$(echo "${issue_ref}" | jq -r '.name // empty')"
            issue_number="$(echo "${issue_ref}" | jq -r '.number // empty')"

            if [ -z "${issue_repo_owner}" ] || [ -z "${issue_repo_name}" ] || \
              ! [[ "${issue_number}" =~ ^[0-9]+$ ]]; then
              echo "Referência de issue inválida para fechamento: ${issue_ref}"
              exit 1
            fi

            issue_state="$(
              gh api \
                "repos/${issue_repo_owner}/${issue_repo_name}/issues/${issue_number}" \
                --jq '.state'
            )"

            if [ "${issue_state}" = "closed" ]; then
              echo "Issue ${issue_repo_owner}/${issue_repo_name}#${issue_number} já estava fechada."
              continue
            fi

            gh api \
              --method PATCH \
              "repos/${issue_repo_owner}/${issue_repo_name}/issues/${issue_number}" \
              -f state='closed' \
              >/dev/null

            echo "Issue ${issue_repo_owner}/${issue_repo_name}#${issue_number} fechada por close_issue_on_merge=true."
          done

      - name: Resumo da execução
        id: summary
        run: |
          set -euo pipefail

          processed_issue_numbers="${{ steps.apply.outputs.processed_issue_numbers }}"
          applied_status_name="${{ steps.context.outputs.target_status_name }}"
          close_applied="false"

          if [ "${{ steps.context.outputs.should_close_issue }}" = "true" ]; then
            close_applied="true"
          fi

          if [ "${{ steps.context.outputs.should_process }}" != "true" ]; then
            processed_issue_numbers=""
            applied_status_name=""
            close_applied="false"
            echo "Sem roteamento nesta execução: ${{ steps.context.outputs.skip_reason }}"
          else
            echo "Roteamento concluído."
            echo "Issues processadas: ${processed_issue_numbers}"
            echo "Status aplicado: ${applied_status_name}"
          fi

          echo "processed_issue_numbers=${processed_issue_numbers}" >> "${GITHUB_OUTPUT}"
          echo "applied_status_name=${applied_status_name}" >> "${GITHUB_OUTPUT}"
          echo "close_issue_on_merge_applied=${close_applied}" >> "${GITHUB_OUTPUT}"
